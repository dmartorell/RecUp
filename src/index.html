<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Shot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-accent: #2563eb;
      --color-accent-hover: #1d4ed8;
      --font-sans: 'Inter', sans-serif;
    }
  </style>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#f5f5f5] font-sans text-gray-900 h-screen flex flex-col overflow-hidden">

  <div id="unsupported" style="display:none; position:fixed; inset:0; background:#fff; z-index:9999; justify-content:center; align-items:center; flex-direction:column; padding:2rem; text-align:center;">
    <div style="max-width:420px;">
      <svg style="width:64px; height:64px; margin:0 auto 1.5rem; color:#d1d5db;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
      <h1 style="font-size:1.5rem; font-weight:600; margin:0 0 0.75rem; color:#111827;">Navegador no compatible</h1>
      <p style="font-size:1rem; line-height:1.6; color:#666; margin:0 0 1.5rem;">Bug Shot necesita APIs que solo estan disponibles en navegadores basados en Chromium. Por favor, usa Chrome o Edge.</p>
      <a href="https://www.google.com/chrome/" style="display:inline-block; background:#2563eb; color:#fff; padding:0.75rem 1.5rem; border-radius:8px; text-decoration:none; font-weight:500; font-size:0.95rem;">Descargar Chrome</a>
    </div>
  </div>

  <div id="app" class="flex flex-col flex-1 overflow-hidden">
    <header class="fixed top-0 left-0 right-0 z-40 border-b border-gray-200/50 backdrop-blur-xl bg-white/20">
      <div class="mx-auto max-w-3xl px-4 py-4">
        <h1 class="text-xl font-semibold text-gray-900">Bug Shot</h1>
      </div>
    </header>

    <main class="mx-auto max-w-3xl w-full px-4 pt-24 pb-32 flex-1 overflow-y-auto">

      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24">
        <span class="text-6xl text-gray-300 mb-4">🐛</span>
        <p class="text-lg font-medium text-gray-600">No tienes bugs reportados</p>
        <p class="text-sm text-gray-400 mt-1">Pulsa el botón para empezar</p>
      </div>

      <div id="feed" class="space-y-4"></div>


    </main>

    <section id="recording-section" class="fixed bottom-0 left-0 right-0 py-4 backdrop-blur-xl bg-white/20 z-40 border-t border-gray-200/50">
      <div class="mx-auto max-w-3xl px-4 flex items-center justify-center relative">
        <button id="clear-all-btn" class="hidden absolute left-4 text-gray-400 hover:text-gray-600 cursor-pointer transition-colors" aria-label="Limpiar todo">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
          </svg>
        </button>
        <button id="record-btn" class="w-[72px] h-[72px] rounded-full bg-accent hover:bg-accent-hover text-white flex flex-col items-center justify-center shadow-lg transition-all cursor-pointer focus:outline-none focus:ring-0">
          <svg id="mic-icon" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/>
          </svg>
          <div id="recording-ui" class="hidden flex flex-col items-center">
            <div class="flex items-center gap-1 h-7">
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
            </div>
            <span id="timer" class="font-mono text-sm text-white/90 leading-none">00:00</span>
          </div>
        </button>
      </div>
    </section>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <div id="ticket-modal" class="modal-overlay hidden" aria-modal="true" role="dialog">
    <div class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-900">Crear Ticket</h2>
        <button id="ticket-close-btn" class="text-gray-400 hover:text-gray-600 text-2xl leading-none cursor-pointer" aria-label="Cerrar">&times;</button>
      </div>

      <div class="px-5 py-4 space-y-4">
        <div>
          <label for="ticket-title" class="block text-sm font-medium text-gray-700 mb-1">Titulo</label>
          <input type="text" id="ticket-title" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent">
        </div>
        <div>
          <label for="ticket-description" class="block text-sm font-medium text-gray-700 mb-1">Descripcion</label>
          <textarea id="ticket-description" readonly rows="4" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50 text-gray-600 resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="ticket-reported-by" class="block text-sm font-medium text-gray-700 mb-1">Reportado por</label>
            <input type="text" id="ticket-reported-by" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent">
          </div>
          <div>
            <label for="ticket-affected-user" class="block text-sm font-medium text-gray-700 mb-1">Usuario afectado</label>
            <input type="text" id="ticket-affected-user" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="ticket-project-id" class="block text-sm font-medium text-gray-700 mb-1">Project ID</label>
            <input type="text" id="ticket-project-id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent">
          </div>
          <div>
            <label for="ticket-asset-id" class="block text-sm font-medium text-gray-700 mb-1">Asset ID</label>
            <input type="text" id="ticket-asset-id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Adjuntos</label>
          <div class="flex gap-2 mb-2">
            <button id="attach-file-btn" type="button" class="text-sm px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer">Anadir archivo</button>
            <button id="attach-camera-btn" type="button" class="text-sm px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer">Hacer foto</button>
            <input type="file" id="attach-file-input" class="hidden" accept="image/*,video/*" multiple>
            <input type="file" id="attach-camera-input" class="hidden" accept="image/*" capture="environment">
          </div>
          <div id="attachment-previews"></div>
          <p id="attachment-error" class="text-sm text-red-600 mt-1 hidden"></p>
        </div>

        <div id="ticket-modal-error" class="text-sm text-red-600 hidden"></div>
      </div>

      <div class="px-5 py-4 border-t border-gray-100 space-y-3">
        <div id="ticket-progress" class="hidden">
          <div class="h-1 bg-gray-200 rounded-full overflow-hidden">
            <div id="ticket-progress-bar" class="progress-bar h-full bg-accent rounded-full" style="width:0%"></div>
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <button id="ticket-cancel-btn" type="button" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer">Cancelar</button>
          <button id="ticket-submit-btn" type="button" class="px-4 py-2 text-sm font-medium text-white bg-accent rounded-lg hover:bg-accent-hover cursor-pointer">Crear Ticket</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
