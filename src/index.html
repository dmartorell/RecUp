<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecUp</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=block"
      as="style"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=block"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-accent: #245e83;
        --color-accent-hover: #0f3550;
        --font-sans: "Poppins", "Inter", sans-serif;
      }
    </style>

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body
    class="bg-[#f5f5f5] font-sans h-screen flex flex-col overflow-hidden"
    style="color: var(--color-text)"
  >
    <div
      id="unsupported"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 2rem;
        text-align: center;
      "
    >
      <div style="max-width: 420px">
        <svg
          style="
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            color: #d1d5db;
          "
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
          />
        </svg>
        <h1
          id="unsupported-title"
          style="
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.75rem;
            color: var(--color-text);
          "
        ></h1>
        <p
          id="unsupported-msg"
          style="
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
            margin: 0 0 1.5rem;
          "
        ></p>
        <a
          id="unsupported-cta"
          href="https://www.google.com/chrome/"
          style="
            display: inline-block;
            background: #245e83;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
          "
        ></a>
      </div>
    </div>

    <div id="login-screen" class="hidden fixed inset-0 z-[70]">
      <div class="login-panel">
        <!-- Panel izquierdo -->
        <div class="login-left">
          <div class="login-left-content">
            <img
              src="img/recUp-full-logo.png"
              alt="RecUp"
              class="login-illustration"
            />
            <h2 id="login-tagline" class="login-left-title"></h2>
            <p id="login-desc" class="login-left-desc"></p>
          </div>
        </div>
        <!-- Panel derecho -->
        <div class="login-right">
          <img
            src="img/alfred-logo.jpg"
            alt="Alfred Smart"
            class="w-48 mb-4 mx-auto"
          />
          <h1
            class="text-[20px] font-medium text-[var(--color-accent)] mb-8 text-center tracking-wide"
          >
            RecUp
          </h1>
          <div class="flex flex-col gap-4">
            <div id="login-name-field" class="invisible order-last">
              <label
                for="login-name"
                class="block text-sm font-light text-gray-400 mb-1"
                >Nombre</label
              >
              <input
                type="text"
                id="login-name"
                class="form-input"
                placeholder="Tu nombre"
              />
            </div>
            <div>
              <label
                for="login-email"
                class="block text-sm font-light text-gray-400 mb-1"
                >Email</label
              >
              <input
                type="email"
                id="login-email"
                class="form-input"
                placeholder="tu@alfredsmart.com"
              />
            </div>
            <div>
              <label
                for="login-password"
                class="block text-sm font-light text-gray-400 mb-1"
                >Contraseña</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="login-password"
                  class="form-input pr-10"
                />
                <button
                  type="button"
                  id="toggle-password-btn"
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer"
                  aria-label="Mostrar contraseña"
                >
                  <svg
                    id="eye-icon"
                    class="w-5 h-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                    />
                  </svg>
                  <svg
                    id="eye-off-icon"
                    class="w-5 h-5 hidden"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <p
              id="login-error"
              class="text-xs text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2 invisible"
            ></p>
            <button
              id="login-btn"
              type="button"
              class="w-full px-4 py-2 text-sm font-light text-white bg-accent rounded-lg hover:bg-accent-hover cursor-pointer"
            >
              Entrar
            </button>
            <p class="text-sm text-center text-gray-400">
              <a
                id="login-toggle-link"
                href="#"
                class="text-accent hover:underline"
                >¿No tienes cuenta? Regístrate</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="app" class="hidden flex flex-col flex-1 overflow-y-auto">
      <header
        class="fixed top-0 left-0 right-0 z-40 border-b border-gray-200/50 backdrop-blur-xl bg-white/20"
      >
        <div
          class="px-6 py-[9px] flex items-center justify-between"
        >
          <h1
            class="text-xl font-light text-[var(--color-accent)] flex items-center gap-2 tracking-wide"
          >
            <img
              src="img/recUp-bg-single-logo.png"
              alt=""
              class="header-logo object-contain"
            />
            RecUp
          </h1>
          <div id="user-avatar" class="hidden flex items-center gap-2">
            <img id="avatar-img" class="hidden w-7 h-7 rounded-full object-cover" alt="" />
            <span
              id="avatar-email"
              class="text-xs text-gray-400 sm:inline"
              style="display: none"
            ></span>
            <button
              id="btn-logout"
              class="text-gray-400 hover:text-[var(--color-accent)] cursor-pointer bg-transparent border-none p-1 flex items-center justify-center"
              title="Cerrar sesión"
            >
              <svg
                width="20"
                height="20"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M5.636 5.636a9 9 0 1 0 12.728 0M12 3v9"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main
        class="mx-auto max-w-3xl w-full px-4 pt-24 pb-32 flex-1 flex flex-col"
      >
        <div
          id="empty-state"
          class="hidden flex flex-col items-center justify-center flex-1"
        >
          <div
            class="panel flex flex-col items-center text-center"
            style="padding: 96px 128px"
          >
            <p
              id="empty-state-title"
              class="text-lg font-medium text-gray-600"
            ></p>
            <p id="empty-state-msg" class="text-sm text-gray-400 mt-1"></p>
          </div>
        </div>

        <div id="feed" class="space-y-4"></div>
      </main>

      <section
        id="recording-section"
        class="fixed bottom-0 left-0 right-0 py-4 backdrop-blur-xl bg-white/20 z-40 border-t border-gray-200/50"
      >
        <div
          class="mx-auto max-w-3xl px-4 flex items-center justify-center relative"
        >
          <button
            id="clear-all-btn"
            class="hidden absolute left-4 text-gray-400 hover:text-black cursor-pointer transition-colors"
            aria-label="Limpiar todo"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
              />
            </svg>
          </button>
          <button
            id="text-input-btn"
            class="hidden w-16 h-16 rounded-full bg-accent hover:bg-accent-hover text-white flex items-center justify-center shadow-lg transition-all cursor-pointer focus:outline-none focus:ring-0"
            aria-label="Reportar por texto"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect
                x="2"
                y="5"
                width="20"
                height="14"
                rx="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                stroke-linecap="round"
                d="M6 9h1M10 9h1M14 9h1M17 9h1M6 13h1M17 13h1M9 13h6"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 17h8"
              />
            </svg>
          </button>
          <button
            id="record-btn"
            class="w-16 h-16 rounded-full bg-accent hover:bg-accent-hover text-white flex flex-col items-center justify-center shadow-lg transition-all cursor-pointer focus:outline-none focus:ring-0"
          >
            <svg
              id="mic-icon"
              class="w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"
              />
            </svg>
            <div
              id="recording-ui"
              class="hidden flex flex-col items-center gap-0.5"
            >
              <div class="flex items-center gap-1 h-4">
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
              </div>
              <span
                id="timer"
                class="font-mono text-sm text-white/90 leading-none"
                >00:00</span
              >
            </div>
          </button>
          <button
            id="mode-toggle-btn"
            class="absolute right-4 text-gray-400 hover:text-black cursor-pointer transition-colors"
            aria-label="Cambiar modo de entrada"
          >
            <svg
              id="mode-icon-keyboard"
              class="w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect
                x="2"
                y="5"
                width="20"
                height="14"
                rx="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                stroke-linecap="round"
                d="M6 9h1M10 9h1M14 9h1M17 9h1M6 13h1M17 13h1M9 13h6"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 17h8"
              />
            </svg>
            <svg
              id="mode-icon-mic"
              class="hidden w-6 h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"
              />
            </svg>
          </button>
        </div>
      </section>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"
    ></div>

    <div
      id="ticket-modal"
      class="modal-overlay hidden"
      aria-modal="true"
      role="dialog"
    >
      <div
        class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-2 max-h-[90vh] overflow-y-auto overscroll-contain"
      >
        <div
          class="flex items-start justify-between px-6 py-4 border-b border-gray-100"
        >
          <div>
            <h2
              id="ticket-modal-title"
              class="text-lg font-medium text-[var(--color-text)]"
            ></h2>
            <p
              id="ticket-modal-subtitle"
              class="text-sm text-gray-400 mt-0.5"
            ></p>
          </div>
          <button
            id="ticket-close-btn"
            class="text-gray-400 hover:text-gray-600 text-2xl leading-none cursor-pointer"
            aria-label="Cerrar"
          >
            &times;
          </button>
        </div>

        <div class="px-6 py-4 space-y-[21px]">
          <div>
            <label
              for="ticket-title"
              class="block text-sm font-medium text-gray-700 mb-2"
              >Título</label
            >
            <input type="text" id="ticket-title" class="form-input" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Producto</label
            >
            <div id="app-badges" class="flex flex-wrap gap-2">
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="alfred"
              >
                Alfred Smart
              </button>
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="nn"
              >
                Núñez i Navarro
              </button>
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="lavidda"
              >
                Lavidda
              </button>
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="dkey"
              >
                D-Key
              </button>
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="assets"
              >
                Assets
              </button>
              <button
                type="button"
                class="badge badge-app cursor-pointer"
                data-app="assets-beta"
              >
                Assets Beta
              </button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Plataforma</label
            >
            <div id="platform-badges" class="flex gap-2">
              <button
                type="button"
                class="badge badge-platform cursor-pointer"
                data-platform="iOS"
              >
                iOS
              </button>
              <button
                type="button"
                class="badge badge-platform cursor-pointer"
                data-platform="Android"
              >
                Android
              </button>
              <button
                type="button"
                class="badge badge-platform cursor-pointer"
                data-platform="Web"
              >
                Web
              </button>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label
                for="ticket-app-version"
                class="block text-sm font-medium text-gray-700 mb-2"
                >Versión</label
              >
              <input
                type="text"
                id="ticket-app-version"
                class="form-input"
                placeholder="1.2.3"
              />
            </div>
            <div>
              <label
                for="ticket-asset-id"
                class="block text-sm font-medium text-gray-700 mb-2"
                >ID de Asset o Proyecto</label
              >
              <input type="text" id="ticket-asset-id" class="form-input" />
            </div>
          </div>

          <div>
            <label
              for="ticket-description"
              class="block text-sm font-medium text-gray-700 mb-2"
              >Descripción</label
            >
            <textarea
              id="ticket-description"
              rows="8"
              class="form-input resize-none"
            ></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Adjuntos</label
            >
            <div class="flex gap-2 mb-2">
              <button
                id="attach-file-btn"
                type="button"
                class="text-sm px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer"
              >
                Añadir archivo
              </button>
              <button
                id="attach-camera-btn"
                type="button"
                class="text-sm px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer"
              >
                Hacer foto
              </button>
              <input
                type="file"
                id="attach-file-input"
                class="hidden"
                accept="image/*,video/*"
                multiple
              />
            </div>
            <div id="attachment-previews"></div>
            <p
              id="attachment-error"
              class="text-xs text-red-600 mt-1 h-4 invisible"
            ></p>
          </div>

          <div
            id="ticket-modal-error"
            class="text-sm text-red-600 invisible"
          ></div>
        </div>

        <div class="px-6 pt-4 pb-6 border-t border-gray-100 space-y-3">
          <div id="ticket-progress" class="hidden">
            <div class="h-1 bg-gray-200 rounded-full overflow-hidden">
              <div
                id="ticket-progress-bar"
                class="progress-bar h-full bg-accent rounded-full"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <div
            id="missing-fields-banner"
            class="hidden rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 mb-4"
          >
            <span
              id="missing-banner-title"
              class="text-sm font-medium text-amber-800 mb-1"
            ></span>
            <p id="missing-banner-msg" class="text-xs text-amber-700 mb-2"></p>
            <ul
              id="missing-fields-list"
              class="text-xs text-amber-700 list-disc pl-5 mb-2 space-y-0.5"
            ></ul>
            <button
              id="missing-fields-complete-btn"
              type="button"
              id="missing-banner-cta"
              class="text-xs text-amber-700 underline cursor-pointer hover:text-amber-900"
            ></button>
          </div>
          <div class="flex justify-end gap-2">
            <button
              id="ticket-cancel-btn"
              type="button"
              class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer"
            >
              Cancelar
            </button>
            <button
              id="ticket-submit-btn"
              type="button"
              class="px-4 py-2 text-sm font-medium text-white bg-accent rounded-lg hover:bg-accent-hover cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed"
            >
              Crear ticket
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="text-input-modal"
      class="modal-overlay hidden"
      aria-modal="true"
      role="dialog"
    >
      <div
        class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6"
      >
        <h3
          id="text-input-title"
          class="text-lg font-medium text-[var(--color-text)] mb-4"
        ></h3>
        <textarea
          id="text-input-area"
          rows="9"
          class="form-input resize-none"
        ></textarea>
        <hr class="border-gray-100 mt-8 mb-4 -mx-6" />
        <div class="flex justify-end gap-3">
          <button
            id="text-input-cancel"
            type="button"
            class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer"
          >
            Cancelar
          </button>
          <button
            id="text-input-submit"
            type="button"
            disabled
            class="px-4 py-2 text-sm font-medium text-white bg-accent rounded-lg hover:bg-accent-hover cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Enviar
          </button>
        </div>
      </div>
    </div>

    <div
      id="confirm-modal"
      class="modal-overlay hidden"
      aria-modal="true"
      role="dialog"
    >
      <div
        class="modal-panel bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6 text-left"
      >
        <h3
          id="confirm-modal-title"
          class="text-lg font-medium text-[var(--color-text)]"
        ></h3>
        <p id="confirm-modal-message" class="text-sm text-gray-400 mt-2"></p>
        <hr class="border-gray-100 mt-8 mb-4 -mx-6" />
        <div class="flex gap-3 justify-end">
          <button
            id="confirm-modal-cancel"
            class="px-4 py-2 rounded-lg border border-gray-200 text-sm text-gray-500 hover:bg-gray-50 cursor-pointer"
          >
            Cancelar
          </button>
          <button
            id="confirm-modal-ok"
            class="px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 cursor-pointer"
          >
            Borrar
          </button>
        </div>
      </div>
    </div>

    <div
      id="camera-overlay"
      class="hidden fixed inset-0 z-[60] bg-black flex flex-col items-center justify-center"
    >
      <video
        id="camera-viewfinder"
        autoplay
        playsinline
        class="max-w-full max-h-[70vh] rounded-lg"
      ></video>
      <canvas id="camera-canvas" class="hidden"></canvas>
      <div class="flex gap-4 mt-6">
        <button
          id="camera-cancel-btn"
          type="button"
          class="px-6 py-3 text-white border border-white/30 rounded-full text-sm font-medium cursor-pointer hover:bg-white/10"
        >
          Cancelar
        </button>
        <button
          id="camera-capture-btn"
          type="button"
          class="px-6 py-3 bg-white text-black rounded-full text-sm font-medium cursor-pointer hover:bg-gray-200"
        >
          Capturar
        </button>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
