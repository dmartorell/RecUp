<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bugshot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <script src="transcriber.js"></script>
</head>
<body>

  <!-- Vista: Login -->
  <div id="view-login">
    <div class="card">
      <div class="logo-area">
        <h1 class="app-title">Bugshot</h1>
        <p class="app-subtitle">Cuéntanos qué está fallando</p>
      </div>

      <div class="form-group">
        <label for="login-email" class="form-label">Email</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          placeholder="tu@alfredsmart.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="login-password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="login-password"
          class="form-input"

          autocomplete="off"
        >
      </div>

      <div id="login-error" class="error-msg">Credenciales incorrectas</div>

      <button id="btn-login" class="btn-primary">Entrar</button>
    </div>
  </div>

  <!-- Vista: Idle -->
  <div id="view-idle" class="hidden">
    <header class="app-header">
      <span id="user-email" class="user-email"></span>
      <button id="btn-logout" class="btn-logout" title="Cerrar sesión">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1 0 12.728 0M12 3v9"/>
        </svg>
      </button>
    </header>
    <div class="idle-body">
      <textarea id="issue-text" placeholder="Describe la incidencia..." rows="4"></textarea>
      <div class="idle-actions">
        <div id="mic-idle" class="mic-container">
          <button id="mic-btn" class="btn-mic" title="Grabar audio">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/>
            </svg>
          </button>
        </div>
        <div id="mic-recording" class="recording-container hidden">
          <button id="stop-btn" class="btn-stop">
            <div class="waveform">
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
            </div>
          </button>
          <span id="timer-display" class="timer-display">00:00</span>
        </div>
        <button id="send-btn" class="btn-send" disabled>Enviar</button>
      </div>
      <p id="mic-error" class="mic-error hidden"></p>
    </div>
  </div>

  <script src="popup.js" defer></script>
</body>
</html>
